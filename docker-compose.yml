services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]

  backend:
    build: ./backend
    restart: unless-stopped
    ports: ["5000:5000"]
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/smart_leads
      JWT_SECRET: change_me_in_production_please
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:8080
      NODE_ENV: production
    depends_on: [mongo]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    restart: unless-stopped
    ports: ["8080:80"]
    depends_on: [backend]

volumes:
  mongo_data:
